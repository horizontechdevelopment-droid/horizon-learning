site_name: Horizon Learning
site_description: Beginner-friendly learning guides from Horizon Tech Development
site_author: Horizon Tech Development
site_url: https://learn.horizontechdevelopment.com/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md

  - Cybersecurity First Steps:
    - Course Overview: cybersecurity-first-steps/index.md

    - "Module 1: Getting Started":
        - "Lesson 1: Learning Path": cybersecurity-first-steps/getting-started/learning-path.md
        - "Lesson 2: What Is Cybersecurity?": cybersecurity-first-steps/getting-started/what-is-cybersecurity.md
        - "Lesson 3: Safety and Permission": cybersecurity-first-steps/getting-started/safety-and-permission.md

    - "Module 2: Kali Linux":
        - "Lesson 4: What Is Kali?": cybersecurity-first-steps/kali/what-is-kali.md
        - "Lesson 5: Download Kali": cybersecurity-first-steps/kali/download-kali.md
        - "Lesson 6: Create a Live USB": cybersecurity-first-steps/kali/create-live-usb.md
        - "Lesson 7: First Boot": cybersecurity-first-steps/kali/first-boot.md

    - "Module 3: Linux Basics":
        - "Lesson 8: Terminal Basics": cybersecurity-first-steps/linux-basics/terminal-basics.md
        - "Lesson 9: Files and Folders": cybersecurity-first-steps/linux-basics/files-and-folders.md
        - "Lesson 10: Useful Commands": cybersecurity-first-steps/linux-basics/useful-commands.md

    - "Module 4: Networking Basics":
        - "Lesson 11: Networking Basics": cybersecurity-first-steps/networking/networking-basics.md
        - "Lesson 12: Wi-Fi Basics": cybersecurity-first-steps/networking/wifi-basics.md
        - "Lesson 13: IP Addresses and Ports": cybersecurity-first-steps/networking/ip-addresses-and-ports.md

    - "Module 5: Beginner Tools":
        - "Lesson 14: Kali Tools Overview": cybersecurity-first-steps/tools/kali-tools-overview.md
        - "Lesson 15: Nmap": cybersecurity-first-steps/tools/nmap.md
        - "Lesson 16: Wireshark": cybersecurity-first-steps/tools/wireshark.md

    - "Module 6: Safe Practice Labs":
        - "Lesson 17: Home Wi-Fi Security Check": cybersecurity-first-steps/labs/home-wifi-security-check.md
        - "Lesson 18: First Nmap Scan": cybersecurity-first-steps/labs/first-nmap-scan.md
        - "Lesson 19: Beginner Lab Roadmap": cybersecurity-first-steps/labs/beginner-lab-roadmap.md

    - Resources:
        - Beginner Progress Checklist: cybersecurity-first-steps/checklists/beginner-progress-checklist.md
        - Glossary: cybersecurity-first-steps/glossary.md

  - About: about.md
  - Teaching Philosophy: teaching-philosophy.md
  - Downloads: downloads.md
  - Updates: updates.md
  - Changelog: changelog.md
  - Content Roadmap: content-roadmap.md
  - Style Guide: style-guide.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true